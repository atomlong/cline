name: Build VSCode Extension

on:
    push:
        branches:
            - main
    pull_request:
    workflow_dispatch:

concurrency:
    group: build-vscode-extension-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    build-extension:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js environment
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: |
                      package-lock.json
                      webview-ui/package-lock.json

            - name: Install root dependencies
              run: npm ci
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Install webview-ui dependencies
              run: cd webview-ui && npm ci

            - name: Build VSCode extension
              run: npm run package

            - name: Get package version
              id: version
              run: |
                  VERSION=$(node -p "require('./package.json').version")
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"

            - name: Package VSIX
              run: npx vsce package --allow-package-secrets sendgrid --out "cline-${{ steps.version.outputs.version }}.vsix"

            - name: Upload VSIX artifact
              uses: actions/upload-artifact@v4
              with:
                  name: cline-vsix-${{ steps.version.outputs.version }}
                  path: cline-${{ steps.version.outputs.version }}.vsix
                  if-no-files-found: error
                  retention-days: 30